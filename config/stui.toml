# stui configuration file
# Location: ~/.stui/config/stui.toml
# All values shown are defaults. Remove a field to use the default.

# IMPORTANT: API keys and passwords should NOT be stored here.
# Instead, use ~/.stui/secrets.env (see below) or environment variables.
#
# Secrets file (~/.stui/secrets.env) format:
#   TMDB_API_KEY=your_tmdb_key
#   OMDB_API_KEY=your_omdb_key
#   LASTFM_API_KEY=your_lastfm_key
#   MPD_PASSWORD=your_mpd_password
#   PROWLARR_API_KEY=your_prowlarr_key
#   OPENSUBTITLES_API_KEY=your_opensubtitles_key
#
# Permissions: chmod 600 ~/.stui/secrets.env

[app]
log_level  = "info"           # trace | debug | info | warn | error
plugin_dir = "~/.stui/plugins"
cache_dir  = "~/.stui/cache"
data_dir   = "~/.stui/data"
theme_mode = "dark"           # dark | light

[ui]
theme         = "default"     # default | dark | light | custom
mouse_support = false
show_borders  = true
panel_ratio   = "60/40"       # left/right panel width split

[runtime]
backend     = "bundled"       # bundled | external | daemon
runtime_bin = ""              # path to stui-runtime if external
socket_path = "~/.local/run/stui.sock"  # used in daemon mode

[keybinds]
quit          = "q"
search        = "/"
navigate_up   = "k"
navigate_down = "j"
select        = "enter"
back          = "esc"
help          = "?"
settings      = ","

# ── Player ────────────────────────────────────────────────────────────────────

[player]
# mpv_bin = "/usr/bin/mpv"
default_volume = 100
hwdec          = "auto"   # auto | vaapi | nvdec | videotoolbox | no
cache_secs     = 20
demuxer_max_mb = 50
keep_open      = false
# mpv_extra_flags = ["--vo=gpu", "--gpu-api=vulkan"]

# ── Streaming ─────────────────────────────────────────────────────────────────

[streaming]
prefer_http       = true
prefer_torrent    = false
max_candidates    = 10
auto_fallback     = true
benchmark_streams = false

# ── Subtitles ─────────────────────────────────────────────────────────────────

[subtitles]
auto_download      = false
preferred_language = "eng"
# download_dir     = "~/.stui/subtitles"
default_delay      = 0.0

# ── Providers ─────────────────────────────────────────────────────────────────
# API keys are loaded from ~/.stui/secrets.env or environment variables.
# See the Secrets section above for details.

[providers]
enable_tmdb          = true
enable_omdb          = false
enable_imdb          = true
enable_torrentio     = true
enable_prowlarr      = false
enable_opensubtitles = false

# ── Stremio addons ────────────────────────────────────────────────────────────

stremio_addons = [
  # "https://torrentio.strem.fun/manifest.json",
]

[plugin]
id           = "kitsu"
name         = "kitsu"
version      = "1.0.0"
abi_version  = 1
description  = "Kitsu — anime metadata (movies + series)"
author       = "stui"
license      = "MIT"
homepage     = "https://kitsu.io"

[env]
KITSU_API_KEY = ""

[[config]]
key      = "api_key"
label    = "Kitsu API Key (optional)"
hint     = "Free at kitsu.io/settings/applications; unauthenticated also works"
masked   = true
required = false
env_var  = "KITSU_API_KEY"

[permissions]
network = ["kitsu.io"]

[rate_limit]
requests_per_second = 1
burst               = 5

[capabilities.catalog]
kinds = ["movie", "series"]

search = true
lookup = { id_sources = ["kitsu", "myanimelist"] }

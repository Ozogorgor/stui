[plugin]
id           = "lastfm"
name         = "lastfm"
version      = "1.0.0"
abi_version  = 1
description  = "Last.fm — music discovery and charts"

# Talks to last.fm's official API at ws.audioscrobbler.com. A free api_key
# is required (https://www.last.fm/api/account/create). libre.fm's endpoint
# used to be the default but now serves a Cloudflare bot-challenge page
# instead of JSON, so the plugin is switched over to the upstream.

[env]
LASTFM_API_KEY = ""

[[config]]
key      = "api_key"
label    = "Last.fm API Key"
hint     = "Free at last.fm/api/account/create"
masked   = true
required = true
env_var  = "LASTFM_API_KEY"

[permissions]
network = ["ws.audioscrobbler.com", "lastfm-img2.akamaized.net", "lastfm.freetls.fastly.net"]

[rate_limit]
# libre.fm / last.fm public endpoints tolerate ~5 req/min in practice; keep
# well under that and let burst cover brief spikes.
requests_per_second = 0.1
burst               = 2

[capabilities.catalog]
kinds = ["artist", "album", "track"]

search = true
enrich = true
# Lookup intentionally omitted: Last.fm's API exposes `artist.getInfo` /
# `album.getInfo` / `track.getInfo` keyed by (name, artist) rather than a
# canonical id, so id-based lookup would require a fake "{artist}|{track}"
# id that doesn't round-trip. enrich covers the realistic use case.

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://www.last.fm/api"

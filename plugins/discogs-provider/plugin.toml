[plugin]
id           = "discogs"
name         = "discogs"
version      = "1.0.0"
abi_version  = 1
description  = "Discogs — music / vinyl metadata (artists + albums)"

[env]
DISCOGS_API_KEY = ""

[[config]]
key      = "api_key"
label    = "Discogs Personal Access Token (optional)"
hint     = "Free at discogs.com/settings/developers. Unauthenticated use works (25 req/min); a token raises the limit to 60 req/min and enables user-scoped endpoints."
masked   = true
required = false
env_var  = "DISCOGS_API_KEY"

[permissions]
network = ["api.discogs.com", "img.discogs.com", "s.discogs.com"]

[rate_limit]
# Unauthenticated Discogs API v2.0 is 25 req/min (~0.4 rps); authenticated
# traffic gets 60 req/min (= 1 rps). Set the conservative 0.4 rps ceiling so
# the rate-limit declaration stays honest for the no-key path.
requests_per_second = 0.4
burst               = 5

[capabilities.catalog]
# Track scope dropped: Discogs has no track API; the release endpoint
# exposes per-track listings but not a per-track addressable resource.
kinds = ["artist", "album"]

search = true
lookup = { id_sources = ["discogs"] }
# Album enrich: returns community rating from /releases/{id}. Falls
# back to a title+artist search when no discogs id is on the partial
# entry, so lastfm-sourced albums (which only have a musicbrainz id)
# can still be enriched.
enrich = { id_sources = ["discogs"] }

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://www.discogs.com"

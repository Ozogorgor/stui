[plugin]
id           = "discogs"
name         = "discogs"
version      = "1.0.0"
abi_version  = 1
description  = "Discogs — music / vinyl metadata (artists + albums)"
author       = "stui"
license      = "MIT"
homepage     = "https://www.discogs.com"

[env]
DISCOGS_API_KEY = ""

[[config]]
key      = "api_key"
label    = "Discogs Personal Access Token"
hint     = "Free at discogs.com/settings/developers"
masked   = true
required = true
env_var  = "DISCOGS_API_KEY"

[permissions]
network = ["api.discogs.com", "img.discogs.com", "s.discogs.com"]

[permissions.rate_limit]
# Discogs free tier: 60 authenticated req/min (= 1 rps).
requests_per_second = 1
burst               = 5

[capabilities.catalog]
# Track scope dropped: Discogs has no track API; the release endpoint
# exposes per-track listings but not a per-track addressable resource.
kinds = ["artist", "album"]

search = true
lookup = { id_sources = ["discogs"] }

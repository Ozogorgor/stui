[plugin]
id           = "omdb"
name         = "omdb"
version      = "1.0.0"
abi_version  = 1
description  = "Open Movie Database — movie/TV info, ratings, posters"
tags         = ["movies", "series"]

[env]
OMDB_API_KEY = ""

[[config]]
key       = "api_key"
label     = "OMDB API Key"
hint      = "Get a free key at www.omdbapi.com/apikey.aspx"
masked    = true
required  = true
env_var   = "OMDB_API_KEY"

[permissions]
network = ["www.omdbapi.com"]

[rate_limit]
requests_per_second = 1
burst               = 5

[capabilities.catalog]
kinds = ["movie", "series"]

search  = true
lookup  = { id_sources = ["imdb"] }
# OMDb's `enrich` reuses the same ?i=<imdb_id> endpoint as lookup —
# the response carries IMDb rating + Rotten Tomatoes + Metacritic in
# the Ratings[] array, which the plugin projects into
# PluginEntry.ratings for the catalog aggregator's weighted composite.
# Falls back to title+year search when the partial entry has no IMDb id.
enrich  = { id_sources = ["imdb"] }
# Artwork / credits / related verbs aren't implemented by OMDB.
artwork = { stub = true, reason = "no API endpoint" }
credits = { stub = true, reason = "no API endpoint" }
related = { stub = true, reason = "no API endpoint" }

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://www.omdbapi.com"

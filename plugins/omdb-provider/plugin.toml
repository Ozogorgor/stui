[plugin]
id           = "omdb"
name         = "omdb"
version      = "1.0.0"
abi_version  = 1
description  = "Open Movie Database — movie/TV info, ratings, posters"

[env]
OMDB_API_KEY = ""

[[config]]
key       = "api_key"
label     = "OMDB API Key"
hint      = "Get a free key at www.omdbapi.com/apikey.aspx"
masked    = true
required  = true
env_var   = "OMDB_API_KEY"

[permissions]
network = ["www.omdbapi.com"]

[rate_limit]
requests_per_second = 1
burst               = 5

[capabilities.catalog]
kinds = ["movie", "series"]

search  = true
lookup  = { id_sources = ["imdb"] }
# OMDb has no enrich / artwork / credits / related endpoints; those verbs are
# omitted so they fall through to the trait's NOT_IMPLEMENTED default.

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://www.omdbapi.com"

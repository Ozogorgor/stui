[plugin]
id           = "anilist"
name         = "anilist"
version      = "1.0.0"
abi_version  = 1
description  = "AniList — anime metadata (movies + series)"

[permissions]
network = ["graphql.anilist.co", "s4.anilist.co"]

[rate_limit]
# AniList allows ~90 req/min in practice. 0.5 rps leaves headroom for bursts.
requests_per_second = 0.5
burst               = 5

[capabilities.catalog]
kinds = ["movie", "series"]

search   = true
lookup   = { id_sources = ["anilist", "myanimelist"] }
enrich   = true
artwork  = { sizes = ["thumbnail", "standard", "hires"] }
credits  = true
related  = true

[meta]
author   = "stui"
license  = "MIT"
homepage = "https://anilist.co"

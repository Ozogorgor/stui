# Clippy configuration for stui-runtime
#
# This file enables stricter clippy lints and allows common patterns
# that are acceptable in this codebase.
#
# Command-line equivalents:
#   cargo clippy -- -A clippy::module_name_repetitions -A clippy::missing_errors_doc ...

# Allowed lints - too noisy for this codebase
type-complexity-threshold = 250
cognitive-complexity-threshold = 30

# MSRV for this project (matches stable)
msrv = "1.80"

# Allow these specific warnings that are acceptable
allow = [
    "clippy::field_reassign_with_default",
    "clippy::len_zero",
    "clippy::len_without_is_empty",
    "clippy::unused_fields",
]

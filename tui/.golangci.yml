run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gocyclo
    - goheader
    - prealloc

linters-settings:
  goheader:
    template: |
      Copyright (c) {{YEAR}} stui contributors
      SPDX-License-Identifier: MIT

  gocyclo:
    min-complexity: 15

  misspell:
    locale: US

  goimports:
    local-prefixes: github.com/stui/stui

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10

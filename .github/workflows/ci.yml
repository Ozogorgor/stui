name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Security Audit ─────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # `dtolnay/install-action@cargo-audit` was removed; use the
      # broader-supported taiki-e installer that handles the same
      # cargo binary distribution.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # cargo audit runs in advisory mode because the workspace
      # carries 30+ advisories from outdated transitive deps
      # (rustls-webpki, tar, wasmtime 22, crossbeam, etc.). Failing
      # the build on each blocks every PR on a deps-upgrade pass
      # that's a separate effort. `cargo audit` exits 1 on any
      # advisory regardless of flags, so we ignore the exit code —
      # the advisories still print in the job log so they're visible.
      # Re-enable strict mode after the wasmtime/rustls-webpki/tar
      # bumps land.
      - name: Run cargo audit (advisory)
        run: cargo audit || true

  # ── Rust ──────────────────────────────────────────────────────────────────────
  rust:
    name: Rust / ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta, nightly]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt,clippy

      # The runtime links against system pipewire/spa via libspa-sys's
      # build script. The Ubuntu runner doesn't ship them by default,
      # so the build script panics with "pkg-config exited with status
      # code 1 — libpipewire-0.3 not found" before cargo even gets to
      # touch project source. Install them ahead of every cargo step.
      # The runtime links system audio + DSP libs via *-sys build
      # scripts (alsa, pipewire/spa). Ubuntu runners ship none of
      # these by default. Bundle them all in one apt step so
      # subsequent cargo invocations don't have to refetch the
      # package index.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            pkg-config

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target

      - name: Check formatting
        working-directory: runtime
        run: cargo fmt --check

      # Clippy runs in advisory mode (warnings don't fail CI) until
      # the codebase has had a focused cleanup pass. Running it
      # without `-D warnings` keeps lint feedback visible in the job
      # log without blocking unrelated PRs on a 265-warning legacy
      # cluster. Re-enable `-D warnings` once main is clippy-clean.
      - name: Run clippy (advisory)
        working-directory: runtime
        run: cargo clippy --all-targets

      - name: Build
        working-directory: runtime
        run: cargo build --release --features wasm-host

      - name: Run tests
        working-directory: runtime
        run: cargo test --lib

  # ── Go ───────────────────────────────────────────────────────────────────────
  go:
    name: Go / ${{ matrix.go_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # 1.25 is the minimum because charm.land/bubbletea/v2,
      # bubbles/v2, lipgloss/v2 and friends declare `go 1.25.0` in
      # their own go.mod files. Older toolchains can't even parse
      # those — the previous [1.21, 1.22, 1.23] matrix could never
      # have worked on the current dep set. Re-add 1.26 once that's
      # available on the runners.
      matrix:
        go_version: ['1.25']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}
          cache: true
          cache-dependency-path: tui/go.sum

      - name: Download Go modules
        working-directory: tui
        run: go mod download

      - name: Check formatting
        working-directory: tui
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [[ -n "$UNFORMATTED" ]]; then
            echo "Files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        working-directory: tui
        run: go vet ./...

      # golangci-lint v2.x requires golangci-lint-action@v7 — v6 of
      # the action explicitly rejects v2 lint binaries. v2.x of the
      # linter itself is built against Go 1.25 (matching our
      # `go 1.25.5` directive from the bubbletea v2 transitive req).
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: tui
          args: --timeout=5m

      - name: Build
        working-directory: tui
        run: go build -o /dev/null ./cmd/stui

  # ── Full Integration Test ─────────────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [rust, go]
    if: ${{ needs.rust.result == 'success' && needs.go.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      # The runtime links system audio + DSP libs via *-sys build
      # scripts (alsa, pipewire/spa). Ubuntu runners ship none of
      # these by default. Bundle them all in one apt step so
      # subsequent cargo invocations don't have to refetch the
      # package index.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            pkg-config

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: tui/go.sum

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target

      - name: Build runtime
        working-directory: runtime
        run: cargo build --release --features wasm-host

      - name: Build TUI
        working-directory: tui
        run: go build -o stui-test ./cmd/stui

      - name: Test runtime help
        run: ./runtime/target/release/stui-runtime --help

      - name: Test IPC handshake
        # Runtime reads from stdin in IPC mode; timeout kills it (exit 124) — that's expected.
        run: timeout 2 ./runtime/target/release/stui-runtime; code=$?; [[ $code -eq 0 || $code -eq 124 ]]

      - name: Cleanup
        run: rm -f tui/stui-test

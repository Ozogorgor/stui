name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Security Audit ─────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: dtolnay/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

  # ── Rust ──────────────────────────────────────────────────────────────────────
  rust:
    name: Rust / ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta, nightly]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target

      - name: Check formatting
        working-directory: runtime
        run: cargo fmt --check

      - name: Run clippy
        working-directory: runtime
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        working-directory: runtime
        run: cargo build --release --features wasm-host

      - name: Run tests
        working-directory: runtime
        run: cargo test --lib

  # ── Go ───────────────────────────────────────────────────────────────────────
  go:
    name: Go / ${{ matrix.go_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go_version: ['1.21', '1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}
          cache: true
          cache-dependency-path: tui/go.sum

      - name: Download Go modules
        working-directory: tui
        run: go mod download

      - name: Check formatting
        working-directory: tui
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [[ -n "$UNFORMATTED" ]]; then
            echo "Files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        working-directory: tui
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: tui
          args: --timeout=5m

      - name: Build
        working-directory: tui
        run: go build -o /dev/null ./cmd/stui

  # ── Full Integration Test ─────────────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [rust, go]
    if: ${{ needs.rust.result == 'success' && needs.go.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: tui/go.sum

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target

      - name: Build runtime
        working-directory: runtime
        run: cargo build --release --features wasm-host

      - name: Build TUI
        working-directory: tui
        run: go build -o stui-test ./cmd/stui

      - name: Test runtime help
        run: ./runtime/target/release/stui-runtime --help

      - name: Test IPC handshake
        run: timeout 2 ./runtime/target/release/stui-runtime || [[ $? -eq 2 ]]

      - name: Cleanup
        run: rm -f tui/stui-test
